name: validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
      - name: Validar contrato enxuto do repositório
        run: node scripts/validate.mjs
      - name: Validar manifesto do plugin
        run: npx --yes @anthropic-ai/claude-code@2.1.203 plugin validate --strict .claude-plugin/plugin.json
      - name: Validar manifesto do marketplace
        run: npx --yes @anthropic-ai/claude-code@2.1.203 plugin validate --strict .claude-plugin/marketplace.json
